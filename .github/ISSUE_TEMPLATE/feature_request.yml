name: Feature request
description: Suggest an idea or improvement.
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for the suggestion. Please describe the idea and the problem it solves.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What's missing or frustrating today? What are you trying to do?
      placeholder: I'd like to compare more than two cities at once because…
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, if any.
    validations:
      required: false
